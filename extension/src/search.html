<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Promnesia Search</title>
        <link rel="stylesheet" type="text/css" href="sidebar.css">
        <script type="module" src='search.js' defer></script>
    </head>
    <body id='promnesia-search' class='promnesia'>
        <div class='search-header'>
            <h1>🔎 Promnesia Search</h1>
            <button class='button' id='button-darkmode'>🌙</button>
        </div>
        <form id='search_id'>
            <input type='text' id='query_id' placeholder="Search visits…" autofocus>
            <button class='button' type='submit'>Search</button>
        </form>

        <div class="promnesia" id='visits'></div>
        <!-- TODO careful with renaming id, css relies on it -->

    </body>
</html>
